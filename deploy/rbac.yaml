apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-guardian
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-guardian
rules:
  # 监听 / Patch Namespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # 在业务命名空间里创建配额 / LimitRange
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # PrometheusRule（Prometheus Operator 的 CRD）
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # 如果后面要管 NetworkPolicy，这里预留
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: namespace-guardian
subjects:
  - kind: ServiceAccount
    name: namespace-guardian
    namespace: kube-system
